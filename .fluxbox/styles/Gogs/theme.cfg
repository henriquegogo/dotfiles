style.name: Gogs
style.author: Henrique Gogó
style.date: March 28, 2021 

toolbar: flat
toolbar.color: #222222
toolbar.textColor: #c0c0c0
toolbar.justify: center
toolbar.height: 18
toolbar.bevelWidth: 6
toolbar.borderWidth: 0
toolbar.workspace: parentrelative
toolbar.workspace.textColor: #c0c0c0
toolbar.iconbar.empty: parentrelative
toolbar.iconbar.focused: parentrelative
toolbar.iconbar.focused.textColor: #f0f0f0
toolbar.iconbar.unfocused: parentrelative
toolbar.iconbar.unfocused.textColor: #808080
toolbar.clock: parentrelative
toolbar.clock.textColor: #c0c0c0
toolbar.button: parentrelative
toolbar.button.picColor: #303030

menu.title: flat
menu.title.color: #333333
menu.title.textColor: #333333
menu.title.font: DejaVu Sans-1
menu.frame: flat
menu.frame.justify: left
menu.frame.color: #222222
menu.frame.textColor: #707070
menu.frame.disableColor: #c0c0c0
menu.hilite: flat
menu.hilite.color: #303030
menu.hilite.textColor: #c0c0c0
menu.itemHeight: 16
menu.bevelWidth: 0
menu.titleHeight: 4
menu.borderColor: #222222
menu.borderWidth: 1
menu.bullet: triangle
menu.bullet.position: Right
menu.submenu.pixmap: 
menu.hilite.submenu.pixmap: 

window.title.focus: flat
window.title.focus.color: #555555
window.title.unfocus: flat
window.title.unfocus.color: #333333
window.title.height: 4
window.justify: left
window.label.focus: parentrelative
window.label.focus.color: #181818
window.label.focus.textColor: #222222
window.label.unfocus: parentrelative
window.label.unfocus.color: #888888
window.label.unfocus.textColor: #606060
window.handle.focus: flat
window.handle.focus.color: #303030
window.handle.unfocus: flat
window.handle.unfocus.color: #222222
window.grip.focus: flat
window.grip.focus.color: #222222
window.grip.unfocus: flat
window.grip.unfocus.color: #222222
window.bevelWidth: 2
window.shade: true
window.borderWidth: 2
window.borderColor: #222222

handleWidth: 0
frameWidth: 1
bevelWidth: 0
borderWidth: 0
borderColor: #222222

*font: DejaVu Sans-8
window*font: DejaVu Sans-1
