set -g history-limit 100000
set -g mouse on
set -g escape-time 10
set -g focus-events on

set -g default-terminal screen-256color
set -g status-fg colour246
set -g status-bg colour232

set -g status-left "#[fg=colour232,bg=colour238] #S #[fg=colour238,bg=colour232]┃"
set -g status-right " #[fg=colour238,bg=colour232]┃#[fg=colour232,bg=colour238] %Y-%m-%d │ %H:%M "
setw -g window-status-format "#[fg=colour238,bg=colour232] #I:#W "
setw -g window-status-current-format "#[fg=colour251,bg=colour236,bold] #I:#W "

set -g prefix C-a
bind-key C-a send-prefix
